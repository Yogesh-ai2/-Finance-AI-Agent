version: '3.8'
services:
  neo4j-fpna:
    image: neo4j:5.26
    container_name: neo4j-fpna
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      - NEO4J_AUTH=neo4j/fpnatech2024
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./volumes/neo4j:/data
    networks:
      - fpna-net

  etcd-fpna:
    container_name: milvus-etcd-fpna
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2382 -listen-client-urls http://0.0.0.0:2382 --data-dir /etcd
    networks:
      - fpna-net

  minio-fpna:
    container_name: milvus-minio-fpna
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9003"
    ports:
      - "9003:9003"
    networks:
      - fpna-net

  milvus-fpna:
    container_name: milvus-fpna
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd-fpna:2382
      MINIO_ADDRESS: minio-fpna:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    ports:
      - "19532:19530"
    depends_on:
      - etcd-fpna
      - minio-fpna
    networks:
      - fpna-net

networks:
  fpna-net:
    driver: bridge
